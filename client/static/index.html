<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz Futebol</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app { text-align:center; }

#score { margin:15px; color:#00ff9f; font-size:20px; }

.option-btn {
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
}

.option-btn:nth-child(1){background:#e21b3c;}
.option-btn:nth-child(2){background:#1368ce;}
.option-btn:nth-child(3){background:#d89e00;}
.option-btn:nth-child(4){background:#26890c;}

.hidden{display:none;}
</style>
</head>

<body>

<div id="app">
    <h1> QUIZ FUTEBOL</h1>
    <h2 id="question">Conectando...</h2>
    <div id="score">Placar: 0 x 0</div>
    <div id="options"></div>
</div>

<div id="result" class="hidden">
    <h1 id="winner"></h1>
</div>

<audio id="win-sound" src="win.mp3"></audio>
<audio id="lose-sound" src="lose.mp3"></audio>

<script>
let ws;
let selected = null;
let correctAnswer = null;
let myPlayer = null;

const params = new URLSearchParams(window.location.search);
let sala = params.get("sala");

function conectar(room_id){
    const protocol = location.protocol === "https:" ? "wss" : "ws";

    ws = new WebSocket(`${protocol}://${location.host}/ws?sala=${room_id}`);

    ws.onopen = () => {
        console.log("Conectado:", room_id);
    };

    ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);
        console.log(msg);

        if(msg.type === "player_id"){
            myPlayer = msg.player;
            console.log("Eu sou:", myPlayer);
        }

        if(msg.type === "waiting"){
            question.innerText = "Aguardando outro jogador...";
        }

        if(msg.type === "start" || msg.type === "next_question"){
            render(msg.state);
        }

        if(msg.type === "update_score"){
            score.innerText = `Placar: ${msg.scores.p1} x ${msg.scores.p2}`;
        }

        if(msg.type === "winner"){
            document.getElementById("app").classList.add("hidden");
            document.getElementById("result").classList.remove("hidden");

            const winSound = document.getElementById("win-sound");
            const loseSound = document.getElementById("lose-sound");

            if(msg.winner === myPlayer){
                document.getElementById("winner").innerText = "VOCÊ GANHOU!";
                winSound.currentTime = 0;
                winSound.play();
            } else {
                document.getElementById("winner").innerText = "VOCÊ PERDEU!";
                loseSound.currentTime = 0;
                loseSound.play();
            }
        }
    };
}

if(!sala){
    fetch("/api/create-room")
    .then(r=>r.json())
    .then(data=>{
        window.location.href = `/?sala=${data.room_id}`;
    });
}else{
    conectar(sala);
}

function render(state){
    selected = null;
    correctAnswer = state.correct;

    question.innerText = state.question;
    options.innerHTML = "";

    state.options.forEach(opt=>{
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;

        btn.onclick = ()=>{
            if(selected) return;

            selected = opt;

            ws.send(JSON.stringify({
                action:"answer",
                answer: opt
            }));
        };

        options.appendChild(btn);
    });
}
</script>

</body>
</html>
